<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://ecomplanprofitsimulator.lnsaw.com/page/workbench/workbench.html">
    <meta name="description" content="全场景单品利润沙盘推演工具，支持电商/直播/外卖/零售，自定义成本拆解、全周期边界测算，算清每一步经营选择的真实代价。">
    <title>全场景单品推演-方案报告</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        crossorigin="anonymous">
    <!-- 公共样式 -->
    <link rel="stylesheet" href="../public.css">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="./css/planReportRoiGraph.css">

</head>

<body>
    <!-- 头部 -->
    <header class="header">
        <div class="container report-container header-content">
            <h1 class="header-title">单量分析图</h1>
            <p class="header-subtitle main-title"></p>
        </div>
    </header>

    <main class="container report-container py-4">
        <div class="row mb-4 g-3 align-items-center">
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">ROI</span>
                    <input type="number" class="form-control" id="volume-graph-roi" min="0" step="0.1" value="0"
                        placeholder="请输入ROI">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">售价</span>
                    <input type="number" class="form-control" id="volume-graph-salePrice" min="0.01" step="0.01"
                        value="0.1">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">开始</span>
                    <input type="number" class="form-control" id="volume-graph-start" min="0" step="0.1" value="1"
                        placeholder="请输入售价">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">步进</span>
                    <input type="number" class="form-control" id="volume-graph-step" min="0.01" step="0.01" value="0.1">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">结束</span>
                    <input type="number" class="form-control" id="volume-graph-end" min="0" step="0.1" value="10">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <button id="volume-graph-generate-btn" class="form-control btn btn-primary">重新生成分析图</button>
                </div>

            </div>
        </div>

        <div id="volume-graph-container" style="width: 100%; height: 600px;"></div>
    </main>

    <!-- Bootstrp JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <!-- 自身 JS -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-stat@1.2.0/dist/ecStat.min.js"
        integrity="sha256-/xLj3SToEeldrxH0s+kpBkAD5sMwo2A8UtLmUppqV4s=" crossorigin="anonymous"></script>
    <script type="module" src="./js/planReportVolumeGraph.js"></script>
</body>

</html>
