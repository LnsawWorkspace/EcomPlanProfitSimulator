<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://ecomplanprofitsimulator.lnsaw.com/page/workbench/workbench.html">
    <meta name="description" content="电商商品利润计算器，帮助您快速计算商品利润，优化电商业务。">
    <title>电商商品利润计算器-方案报告</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        crossorigin="anonymous">
    <!-- 公共样式 -->
    <link rel="stylesheet" href="../public.css">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="./css/planReportRoiGraph.css">

</head>

<body>
    <!-- 头部 -->
    <header class="header">
        <div class="container report-container header-content">
            <h1 class="header-title">ROI曲线图</h1>
            <p class="header-subtitle main-title"></p>
        </div>
    </header>

    <main class="container report-container py-4">
        <div class="row mb-4 g-3 align-items-center">
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">售价</span>
                    <input type="number" class="form-control" id="roi-graph-salePrice" min="0" step="0.1" value="0"
                        placeholder="请输入售价">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">单量</span>
                    <input type="number" class="form-control" id="roi-graph-orderQuantity" min="0.01" step="0.01"
                        value="0.1">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">开始</span>
                    <input type="number" class="form-control" id="roi-graph-start" min="0" step="0.1" value="1"
                        placeholder="请输入售价">
                </div>
            </div>
            <!-- 步进之后有时间了改成 下拉框，只能选 0.1 0.05 0.02 0.01 0.005 0.002 0.001 0.0005 0.0002 0.0001-->
            <!-- 或者考虑 根据start和end，提供合适的步进选项，可以在触发下拉事件时动态生成 -->
            <!-- 同时，当start和end变化时，也需要动态调整步进选项，如果范围不合适，下拉框应该变为，请选择步进，或者之间选择一个默认的合适步进 -->
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">步进</span>
                    <input type="number" class="form-control" id="roi-graph-step" min="0.01" step="0.01" value="0.1">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">结束</span>
                    <input type="number" class="form-control" id="roi-graph-end" min="0" step="0.1" value="10">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <button id="roi-graph-generate-btn" class="form-control btn btn-primary">重新生成分析图</button>
                </div>

            </div>
        </div>

        <div id="roi-graph-container" style="width: 100%; height: 600px;"></div>
    </main>

    <!-- Bootstrp JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <!-- 自身 JS -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-stat@1.2.0/dist/ecStat.min.js"
        integrity="sha256-/xLj3SToEeldrxH0s+kpBkAD5sMwo2A8UtLmUppqV4s=" crossorigin="anonymous"></script>
    <script type="module" src="./js/planReportRoiGraph.js"></script>
</body>

</html>
