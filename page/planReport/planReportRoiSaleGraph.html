<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://ecomplanprofitsimulator.lnsaw.com/page/workbench/workbench.html">
    <meta name="description" content="全场景单品利润沙盘推演工具，支持电商/直播/外卖/零售，自定义成本拆解、全周期边界测算，算清每一步经营选择的真实代价。">
    <title>全场景单品推演-方案报告</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        crossorigin="anonymous">
    <!-- 公共样式 -->
    <link rel="stylesheet" href="../public.css">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="./css/planReportRoiGraph.css">

</head>

<body>
    <!-- 头部 -->
    <header class="header">
        <div class="container report-container header-content">
            <h1 class="header-title">ROI和售价分析图</h1>
            <p class="header-subtitle main-title"></p>
        </div>
    </header>

    <main class="container report-container py-4">
        <div class="row mb-4 g-3 align-items-center">
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">销量</span>
                    <input type="number" class="form-control" id="volume-graph" min="0" step="0.1" value="0"
                        placeholder="请输入销量">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">最小利润</span>
                    <input type="number" class="form-control" id="min-profit" min="0" step="0.1" value="0"
                        placeholder="">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">最大利润</span>
                    <input type="number" class="form-control" id="max-profit" min="0" step="0.1" value="10000"
                        placeholder="">
                </div>
            </div>

            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">售价开始</span>
                    <input type="number" class="form-control" id="sale-graph-start" min="0" step="0.1" value="0"
                        placeholder="">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">售价步进</span>
                    <input type="number" class="form-control" id="sale-graph-step" min="0.01" step="0.01" value="0.1">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">售价结束</span>
                    <input type="number" class="form-control" id="sale-graph-end" min="0" step="0.1" value="10">
                </div>
            </div>

            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">Roi开始</span>
                    <input type="number" class="form-control" id="roi-graph-start" min="0" step="0.1" value="0"
                        placeholder="">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">Roi步进</span>
                    <input type="number" class="form-control" id="roi-graph-step" min="0.01" step="0.01" value="0.1">
                </div>
            </div>
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text">Roi结束</span>
                    <input type="number" class="form-control" id="roi-graph-end" min="0" step="0.1" value="10">
                </div>
            </div>

            <div class="col-md-3">
                <div class="input-group">
                    <button id="saleAndVolume-graph-generate-btn" class="form-control btn btn-primary">重新生成分析图</button>
                    <button id="saleAndVolume-graph-show-selected-btn" class="form-control btn btn-primary">显示选择的利润范围</button>
                </div>
            </div>
        </div>

        <div id="saleAndVolume-graph-container" style="width: 100%; height: 600px;"></div>
    </main>

    <!-- Bootstrp JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <!-- 自身 JS -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-stat@1.2.0/dist/ecStat.min.js"
        integrity="sha256-/xLj3SToEeldrxH0s+kpBkAD5sMwo2A8UtLmUppqV4s=" crossorigin="anonymous"></script>
    <script type="module" src="./js/planReportRoiSaleGraph.js"></script>
</body>

</html>
